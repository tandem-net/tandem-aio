# Builds the downloadable node binaries for every platform and attaches them to
# a GitHub Release.
#
# The trick to making this transferable is to build each package on its own
# native runner -- the .deb on Linux, the .exe on Windows, the .dmg on macOS --
# instead of trying to cross-compile from one machine. Each job compiles the node
# with Rust, packages it, and uploads the result.
#
# To cut a release: push a tag that starts with "v", e.g.
#   git tag v0.1.0
#   git push origin v0.1.0
# You can also run it by hand from the Actions tab (workflow_dispatch) to check
# the builds without publishing anything.

name: release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

# Needed so the workflow can create/attach assets to a Release.
permissions:
  contents: write

jobs:
  build:
    strategy:
      # Don't cancel the other platforms if one fails -- we'd rather see all
      # three results.
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact: deb
          - os: macos-latest
            artifact: dmg
          - os: windows-latest
            artifact: exe

    runs-on: ${{ matrix.os }}

    steps:
      - name: Check out the repo
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build the node
        run: cargo build --release --manifest-path node/Cargo.toml

      - name: Package .deb (Linux)
        if: matrix.artifact == 'deb'
        run: bash node/packaging/build-deb.sh

      - name: Package .dmg (macOS)
        if: matrix.artifact == 'dmg'
        run: bash node/packaging/build-dmg.sh

      - name: Stage .exe (Windows)
        if: matrix.artifact == 'exe'
        shell: bash
        run: |
          mkdir -p node/packaging/dist
          cp node/target/release/tandem-node.exe node/packaging/dist/tandem-node-windows-x86_64.exe

      # Keep the built package around on every run (including workflow_dispatch),
      # so you can download and test it even when there's no release to attach to.
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: tandem-node-${{ matrix.artifact }}
          path: node/packaging/dist/*

      # Only attach to a Release when this run was triggered by a version tag.
      - name: Attach to the release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: node/packaging/dist/*
