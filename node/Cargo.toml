[package]
name = "node"
version = "0.1.0"
edition = "2024"

[dependencies]
reqwest = { version = "0.13.4", features = ["json", "stream"] }

tokio = { version = "1", features = ["rt-multi-thread", "macros"] }

futures-util = "0.3"

serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"